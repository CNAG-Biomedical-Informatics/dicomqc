id: dicomqc_02_findings
parent_id: dicomqc
parent_name: dicomqc
parent_description: DICOM metadata quality-control summaries generated by dicomqc.
section_name: dicomqc findings requiring review
description: Redaction-safe dicomqc warnings and errors. Values are never shown in
  this table.
plot_type: table
data:
  finding_001:
    file: dicom/private_tags.dcm
    severity: warning
    rule_id: research-release-v0.1.private_tags.present
    tag: ''
    keyword: PrivateTags
    value_state: present
    message: 1 private DICOM tag(s) are present.
  finding_002:
    file: dicom/raw_phi.dcm
    severity: error
    rule_id: research-release-v0.1.direct_phi.PatientBirthDate
    tag: (0010,0030)
    keyword: PatientBirthDate
    value_state: present
    message: PatientBirthDate is populated and may contain direct PHI.
  finding_003:
    file: dicom/raw_phi.dcm
    severity: warning
    rule_id: research-release-v0.1.pseudonym_format.PatientID
    tag: (0010,0020)
    keyword: PatientID
    value_state: present
    message: PatientID is populated but does not match the built-in research pseudonym
      pattern.
  finding_004:
    file: dicom/raw_phi.dcm
    severity: warning
    rule_id: research-release-v0.1.pseudonym_format.PatientName
    tag: (0010,0010)
    keyword: PatientName
    value_state: present
    message: PatientName is populated but does not match the built-in research pseudonym
      pattern.
  finding_005:
    file: dicom/raw_phi.dcm
    severity: warning
    rule_id: research-release-v0.1.private_tags.present
    tag: ''
    keyword: PrivateTags
    value_state: present
    message: 1 private DICOM tag(s) are present.
pconfig:
  id: dicomqc_findings_table
  title: dicomqc findings requiring review
headers:
  severity:
    title: Severity
    description: dicomqc finding severity
    bgcols:
      error: '#dc2626'
      warning: '#f59e0b'
  file:
    title: File
    description: Relative DICOM file path
    scale: false
  keyword:
    title: Keyword
    description: DICOM keyword or finding group
  tag:
    title: Tag
    description: DICOM tag when applicable
  value_state:
    title: Value state
    description: Redaction-safe value state
    bgcols:
      present: '#f97316'
      empty: '#94a3b8'
      absent: '#22c55e'
  rule_id:
    title: Rule
    description: Stable dicomqc rule identifier
    scale: false
  message:
    title: Finding
    description: Finding summary
    scale: false
