headers:
  Status:
    title: Status
    description: pass, review, or blocked
    bgcols:
      pass: '#16a34a'
      review: '#f59e0b'
      blocked: '#dc2626'
  Profile:
    title: Profile
    description: dicomqc profile used for the audit
    scale: false
  Files scanned:
    title: Scanned
    description: DICOM files successfully scanned
    scale: Blues
  Files passed:
    title: Passed
    description: Scanned files without error findings
    scale: Greens
  Files failed:
    title: Failed
    description: Scanned files with error findings
    scale: Reds
  Errors:
    title: Errors
    description: Blocking dicomqc findings
    scale: Reds
  Warnings:
    title: Warnings
    description: Findings requiring review
    scale: YlOrBr
  Skipped files:
    title: Skipped
    description: Files that could not be read as DICOM
    scale: Purples
