name: Publish to PyPI

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out release
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DCMTK
        run: |
          sudo apt-get update
          sudo apt-get install -y dcmtk

      - name: Install test and release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[release,test]"

      - name: Run tests with coverage gate
        run: pytest

      - name: Verify release version
        run: |
          package_version=$(python -c "from dicomqc import __version__; print(__version__)")
          metadata_version=$(python -c "from importlib.metadata import version; print(version('dicomqc'))")
          test "$GITHUB_REF_NAME" = "v$package_version" || {
            echo "Release tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          }
          test "$metadata_version" = "$package_version" || {
            echo "Distribution version $metadata_version does not match package version $package_version"
            exit 1
          }
          grep -Fq "## [$package_version]" CHANGELOG.md || {
            echo "CHANGELOG.md has no entry for $package_version"
            exit 1
          }

      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Test built wheel and MultiQC integration
        working-directory: /tmp
        run: |
          python -m venv dicomqc-pypi-wheel-test
          dicomqc-pypi-wheel-test/bin/python -m pip install --upgrade pip
          dicomqc-pypi-wheel-test/bin/python -m pip install "$GITHUB_WORKSPACE"/dist/*.whl multiqc
          test "$(dicomqc-pypi-wheel-test/bin/dicomqc --version)" = "dicomqc ${GITHUB_REF_NAME#v}"
          dicomqc-pypi-wheel-test/bin/dicomqc --help
          dicomqc-pypi-wheel-test/bin/dicomqc demo --output-dir /tmp/dicomqc-pypi-demo
          test -s /tmp/dicomqc-pypi-demo/dicomqc/report.json
          test -s /tmp/dicomqc-pypi-demo/dicomqc/findings.csv
          test -s /tmp/dicomqc-pypi-demo/dicomqc/dicomqc_mqc/dicomqc_summary_mqc.yaml
          dicomqc-pypi-wheel-test/bin/multiqc /tmp/dicomqc-pypi-demo/dicomqc \
            --outdir /tmp/dicomqc-pypi-demo \
            --force \
            --config "$GITHUB_WORKSPACE/examples/multiqc/multiqc_config.yaml"
          test -s /tmp/dicomqc-pypi-demo/multiqc_report.html

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dicomqc
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
