<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 810" role="img" aria-labelledby="title desc">
  <title id="title">dicomqc remediation loop</title>
  <desc id="desc">An immutable DICOM source is processed by an external transformation tool to create a candidate dataset. dicomqc audits the candidate. Findings return to the external tool for remediation and regeneration, while a passing result proceeds to release evidence.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrowHead"/>
    </marker>
    <marker id="feedbackArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="feedbackHead"/>
    </marker>
    <style>
      .node { fill: #ffffff; stroke: #adbbbd; stroke-width: 1.25; }
      .transform { fill: #f7eee9; stroke: #b97858; }
      .audit { fill: #eaf4f3; stroke: #4e8f96; }
      .result { fill: #edf3ec; stroke: #789475; }
      .flow { fill: none; stroke: #60757a; stroke-width: 1.6; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #a45c39; stroke-width: 1.6; marker-end: url(#feedbackArrow); }
      .arrowHead { fill: #60757a; }
      .feedbackHead { fill: #a45c39; }
      .pageTitle { fill: #18272e; font: 700 25px Inter, Arial, sans-serif; letter-spacing: 0; }
      .phase { fill: #934927; font: 700 11px Inter, Arial, sans-serif; letter-spacing: 0; }
      .nodeTitle { fill: #18272e; font: 700 20px Inter, Arial, sans-serif; letter-spacing: 0; }
      .detail { fill: #52636a; font: 15px Inter, Arial, sans-serif; letter-spacing: 0; }
      .code { fill: #075761; font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
      .note { fill: #68797e; font: 14px Inter, Arial, sans-serif; letter-spacing: 0; }
      .feedbackText { fill: #934927; font: 700 11px Inter, Arial, sans-serif; letter-spacing: 0; }
      @media (prefers-color-scheme: dark) {
        .node { fill: #192125; stroke: #526166; }
        .transform { fill: #352923; stroke: #d28d6b; }
        .audit { fill: #203436; stroke: #70bdc4; }
        .result { fill: #263126; stroke: #91ae8d; }
        .flow { stroke: #91a4a7; }
        .feedback { stroke: #e09b78; }
        .arrowHead { fill: #91a4a7; }
        .feedbackHead { fill: #e09b78; }
        .pageTitle, .nodeTitle { fill: #edf2f2; }
        .phase, .feedbackText { fill: #e09b78; }
        .detail, .note { fill: #aebbbc; }
        .code { fill: #9bd5d8; }
      }
    </style>
  </defs>

  <text x="30" y="35" class="pageTitle">Read-only audit and remediation loop</text>
  <text x="30" y="63" class="note">Transform files externally, evaluate the candidate, and regenerate rather than patching the only source copy</text>

  <rect x="180" y="90" width="540" height="82" rx="4" class="node"/>
  <text x="204" y="116" class="phase">SOURCE CONTROL</text>
  <text x="204" y="145" class="nodeTitle">Immutable source DICOM</text>
  <text x="493" y="144" class="detail">Restricted original dataset</text>
  <line x1="450" y1="173" x2="450" y2="202" class="flow"/>

  <rect x="180" y="205" width="540" height="96" rx="4" class="node transform"/>
  <text x="204" y="232" class="phase">EXTERNAL TRANSFORMATION</text>
  <text x="204" y="261" class="nodeTitle">Pseudonymization or remediation tool</text>
  <text x="204" y="284" class="detail">dcmodify / Orthanc / XNAT / pydicom / site pipeline</text>
  <line x1="450" y1="302" x2="450" y2="331" class="flow"/>

  <rect x="180" y="334" width="540" height="82" rx="4" class="node"/>
  <text x="204" y="360" class="phase">WORKING OUTPUT</text>
  <text x="204" y="389" class="nodeTitle">Candidate release DICOM</text>
  <text x="503" y="388" class="detail">Derived working copy</text>
  <line x1="450" y1="417" x2="450" y2="446" class="flow"/>

  <rect x="180" y="449" width="540" height="96" rx="4" class="node audit"/>
  <text x="204" y="476" class="phase">INDEPENDENT QC</text>
  <text x="204" y="505" class="nodeTitle">dicomqc metadata audit</text>
  <text x="204" y="528" class="detail">Read-only policy evaluation</text>
  <text x="494" y="527" class="code">JSON / CSV / MultiQC</text>
  <line x1="450" y1="546" x2="450" y2="575" class="flow"/>

  <rect x="180" y="578" width="540" height="100" rx="4" class="node result"/>
  <text x="204" y="605" class="phase">DECISION</text>
  <text x="204" y="634" class="nodeTitle">Pass or actionable findings</text>
  <text x="559" y="633" class="code">exit 0 / 1 / 2</text>
  <text x="204" y="657" class="detail">Recommendations update the transformation workflow</text>

  <path d="M 180 628 L 67 628 L 67 253 L 178 253" class="feedback"/>
  <text x="84" y="423" class="feedbackText">FIX POLICY</text>
  <text x="84" y="440" class="feedbackText">REGENERATE</text>
  <text x="84" y="457" class="feedbackText">RERUN</text>

  <line x1="450" y1="679" x2="450" y2="722" class="flow"/>
  <text x="467" y="709" class="phase">PASSED AND REVIEWED</text>
  <rect x="275" y="725" width="350" height="62" rx="4" class="node"/>
  <text x="299" y="750" class="phase">RELEASE RECORD</text>
  <text x="299" y="775" class="nodeTitle">DICOM + audit evidence</text>
</svg>
