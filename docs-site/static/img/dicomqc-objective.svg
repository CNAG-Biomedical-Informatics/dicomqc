<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" role="img" aria-labelledby="title desc">
  <title id="title">dicomqc audit objective</title>
  <desc id="desc">A candidate DICOM dataset produced by an external transformation moves through an independent dicomqc metadata audit to structured evidence for release review.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrowHead"/>
    </marker>
    <style>
      .node { fill: #ffffff; stroke: #aebcbd; stroke-width: 1.25; }
      .audit { fill: #eaf4f3; stroke: #0b6b76; stroke-width: 1.5; }
      .flow { fill: none; stroke: #60757a; stroke-width: 1.6; marker-end: url(#arrow); }
      .arrowHead { fill: #60757a; }
      .eyebrow { fill: #934927; font: 700 12px Inter, Arial, sans-serif; letter-spacing: 0; }
      .title { fill: #18272e; font: 700 22px Inter, Arial, sans-serif; letter-spacing: 0; }
      .detail { fill: #52636a; font: 16px Inter, Arial, sans-serif; letter-spacing: 0; }
      .auditTitle { fill: #075761; }
      @media (prefers-color-scheme: dark) {
        .node { fill: #192125; stroke: #55666a; }
        .audit { fill: #203436; stroke: #70bdc4; }
        .flow { stroke: #91a4a7; }
        .arrowHead { fill: #91a4a7; }
        .eyebrow { fill: #e09b78; }
        .title { fill: #edf2f2; }
        .detail { fill: #aebbbc; }
        .auditTitle { fill: #9bd5d8; }
      }
    </style>
  </defs>

  <rect x="24" y="18" width="472" height="78" rx="4" class="node"/>
  <text x="46" y="48" class="eyebrow">EXTERNAL TRANSFORMATION OUTPUT</text>
  <text x="46" y="78" class="title">Candidate DICOM dataset</text>

  <line x1="260" y1="97" x2="260" y2="121" class="flow"/>

  <rect x="24" y="124" width="472" height="92" rx="4" class="audit"/>
  <text x="46" y="156" class="eyebrow">INDEPENDENT CONTROL POINT</text>
  <text x="46" y="187" class="title auditTitle">dicomqc metadata audit</text>
  <text x="362" y="186" class="detail">read-only</text>

  <line x1="260" y1="217" x2="260" y2="241" class="flow"/>

  <rect x="24" y="244" width="472" height="78" rx="4" class="node"/>
  <text x="46" y="274" class="eyebrow">RELEASE-REVIEW EVIDENCE</text>
  <text x="46" y="304" class="title">JSON</text>
  <text x="150" y="304" class="title">CSV</text>
  <text x="244" y="304" class="title">MultiQC</text>
  <text x="382" y="303" class="detail">exit status</text>
</svg>
