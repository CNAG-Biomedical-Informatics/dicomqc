<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-labelledby="title description">
  <title id="title">DICOM metadata audit workflow</title>
  <desc id="description">Raw DICOM files are pseudonymized by an external workflow, audited by dicomqc, and summarized as JSON, CSV, and MultiQC evidence for research release review.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#78909b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#14323f" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="380" fill="#ffffff"/>
  <g font-family="Arial, sans-serif">
    <text x="52" y="34" fill="#49616c" font-size="13" font-weight="700">SOURCE DATA</text>
    <text x="350" y="34" fill="#49616c" font-size="13" font-weight="700">PSEUDONYMIZATION</text>
    <text x="658" y="34" fill="#49616c" font-size="13" font-weight="700">DICOMQC AUDIT</text>
    <text x="946" y="34" fill="#49616c" font-size="13" font-weight="700">RELEASE EVIDENCE</text>

    <g filter="url(#shadow)">
      <rect x="52" y="70" width="210" height="220" rx="8" fill="#f8fafb" stroke="#c8d5da"/>
      <rect x="72" y="92" width="72" height="92" rx="5" fill="#ffffff" stroke="#6d8995" stroke-width="2"/>
      <path d="M128 92v20h16" fill="#edf3f5" stroke="#6d8995" stroke-width="2"/>
      <rect x="96" y="205" width="72" height="54" rx="4" fill="#dcecf1" stroke="#0f7897"/>
      <path d="M96 222h72M114 205v54M150 205v54" stroke="#0f7897" opacity="0.48"/>
      <text x="82" y="126" fill="#174e62" font-size="15" font-weight="700">raw.dcm</text>
      <text x="84" y="156" fill="#5f7480" font-size="12">PatientName</text>
      <text x="84" y="172" fill="#5f7480" font-size="12">StudyDate</text>
      <text x="98" y="280" fill="#49616c" font-size="12">immutable archive</text>
    </g>

    <path d="M280 180H330" fill="none" stroke="#78909b" stroke-width="2" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="350" y="70" width="210" height="220" rx="8" fill="#f8fafb" stroke="#c8d5da"/>
      <rect x="384" y="100" width="142" height="68" rx="8" fill="#e5f2e9" stroke="#35a878" stroke-width="2"/>
      <text x="455" y="132" fill="#277b59" font-size="14" font-weight="700" text-anchor="middle">external tool</text>
      <text x="455" y="152" fill="#49616c" font-size="11" text-anchor="middle">dcmodify / Orthanc / XNAT</text>
      <g fill="none" stroke="#78909b" stroke-width="2">
        <path d="M398 205h90"/>
        <path d="M408 218h70"/>
        <path d="M418 231h84"/>
      </g>
      <circle cx="505" cy="218" r="22" fill="#ffffff" stroke="#35a878" stroke-width="2"/>
      <path d="M495 218l7 7 14-17" fill="none" stroke="#35a878" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="397" y="280" fill="#49616c" font-size="12">writes candidate DICOM</text>
    </g>

    <path d="M578 180H628" fill="none" stroke="#78909b" stroke-width="2" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="658" y="70" width="210" height="220" rx="8" fill="#f8fafb" stroke="#c8d5da"/>
      <rect x="686" y="98" width="154" height="34" rx="5" fill="#174e62"/>
      <text x="763" y="120" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">dicomqc scan</text>
      <g transform="translate(688 158)">
        <rect width="150" height="22" rx="4" fill="#fff3e9" stroke="#df8b50"/>
        <rect y="36" width="150" height="22" rx="4" fill="#e8f3f6" stroke="#0f7897"/>
        <rect y="72" width="150" height="22" rx="4" fill="#edf1f3" stroke="#7d93a0"/>
        <text x="12" y="15" fill="#9b4b19" font-size="11" font-weight="700">PHI fields</text>
        <text x="12" y="51" fill="#0f617c" font-size="11" font-weight="700">pseudonym risks</text>
        <text x="12" y="87" fill="#526973" font-size="11" font-weight="700">private tags</text>
      </g>
      <text x="708" y="280" fill="#49616c" font-size="12">metadata only, no pixels</text>
    </g>

    <path d="M886 180H926" fill="none" stroke="#78909b" stroke-width="2" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="946" y="70" width="202" height="220" rx="8" fill="#f8fafb" stroke="#c8d5da"/>
      <g transform="translate(974 100)">
        <rect width="146" height="36" rx="5" fill="#dcecf1" stroke="#0f7897"/>
        <rect y="52" width="146" height="36" rx="5" fill="#e5f2e9" stroke="#35a878"/>
        <rect y="104" width="146" height="36" rx="5" fill="#f4ecfb" stroke="#8f66b4"/>
        <text x="73" y="23" fill="#0f617c" font-size="13" font-weight="700" text-anchor="middle">report.json</text>
        <text x="73" y="75" fill="#277b59" font-size="13" font-weight="700" text-anchor="middle">findings.csv</text>
        <text x="73" y="127" fill="#6b3f8c" font-size="13" font-weight="700" text-anchor="middle">MultiQC</text>
      </g>
      <g transform="translate(1016 254)">
        <circle cx="0" cy="0" r="12" fill="#276749"/>
        <path d="M-5 0l4 4 8-10" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="22" y="4" fill="#49616c" font-size="12">release review</text>
      </g>
    </g>
  </g>
</svg>
